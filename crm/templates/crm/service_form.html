{% extends 'crm/base_crm.html' %}
{% load static %}

{% block title %}{{ title }} - CRM Аргус{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-6">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ title }}</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-6">
                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                    Название услуги *
                </label>
                <input type="text" 
                       name="name" 
                       id="name" 
                       value="{{ service.name|default:'' }}" 
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent"
                       placeholder="Введите название услуги">
            </div>
            
            <div class="mb-6">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" 
                           name="has_kp" 
                           {% if service.has_kp %}checked{% endif %}
                           class="w-4 h-4 text-gold border-gray-300 rounded focus:ring-gold">
                    <span class="text-sm font-medium text-gray-700">Включать в коммерческие предложения</span>
                </label>
                <p class="text-sm text-gray-500 mt-1 ml-7">
                    Если включено, услуга будет доступна для выбора при создании КП
                </p>
            </div>
            
            <div class="flex gap-3 pt-4 border-t border-gray-200">
                <button type="submit" 
                        class="btn-gold px-6 py-2 rounded-lg font-medium">
                    {% if service %}Сохранить{% else %}Создать{% endif %}
                </button>
                <a href="{% url 'crm_services' %}" 
                   class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
